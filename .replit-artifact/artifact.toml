kind = "web"
previewPath = "/"
title = "멍케어 (MeongCare)"
version = "1.0.0"
id = "artifacts/meongcare"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 18153
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/meongcare run dev"

[services.env]
PORT = "18153"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/meongcare", "run", "build"]
publicDir = "artifacts/meongcare/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
